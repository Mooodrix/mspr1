<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Données Monkeypox</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap5.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Empêche le défilement */
        }
        .sidebar {
            width: 250px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(145deg, #2c3e50, #34495e);
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.2);
            color: white;
            border-radius: 0 15px 15px 0;
            padding-right: 5px;
        }
        .sidebar nav a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            margin: 5px 0;
            transition: 0.3s;
        }
        .sidebar nav a:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }
        .content {
            margin-left: 270px;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
            margin-right: 20px;
            overflow: hidden; /* Empêche le défilement */
        }
        .info-box {
            padding: 10px 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            font-size: 14px;
            margin-top: 40px; /* Ajoute une marge supérieure pour abaisser la boîte d'information */
        }
        .card {
            margin-bottom: 20px;
            margin-top: 20px; /* Ajoute une marge supérieure pour abaisser les cartes */
        }
        canvas {
            margin-top: 15px;
            max-width: 100%; /* Ajuste la taille du canvas */
            max-height: 300px; /* Limite la hauteur du canvas */
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- Barre de navigation -->
<div class="sidebar d-flex flex-column p-3 bg-light vh-100">
    <a href="/" class="btn btn-primary w-100 fw-bold text-start">🐒 Monkeypox</a>
    <nav class="mt-3">
        <a href="/" class="btn btn-outline-dark w-100 text-start mb-2">🏠 Accueil</a>
        <a href="/tableau" class="btn btn-outline-dark w-100 text-start mb-2">📊 Tableau</a>
        <a href="/graphique" class="btn btn-outline-dark w-100 text-start mb-2">📈 Graphique</a>
    </nav>
    <div class="mt-auto">
        <a href="/ajout" class="btn btn-primary w-100 mb-2">➕ Ajouter</a>
        <a href="/importCSV" class="btn btn-success w-100">📂 Importer CSV</a>
    </div>
</div>

<!-- Contenu principal -->
<div class="content">
    <h2 class="text-center mb-5">Bienvenue sur la gestion des données Monkeypox</h2>
    <p class="text-center">Utilisez le menu pour naviguer dans l'application.</p>

    <!-- Info Box -->
    <div class="row">
        <div class="col-md-4">
            <div class="card text-white bg-primary mb-3">
                <div class="card-header">Cas</div>
                <div class="card-body">
                    <h5 class="card-title" id="total_cases">0</h5>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-danger mb-3">
                <div class="card-header">Décès</div>
                <div class="card-body">
                    <h5 class="card-title" id="total_deaths">0</h5>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-secondary mb-3">
                <div class="card-header">Dernière mise à jour</div>
                <div class="card-body">
                    <h5 class="card-title" id="last_update">N/A</h5>
                </div>
            </div>
        </div>
    </div>
    <div class="info-box">
        <canvas id="info-chart" width="400" height="200"></canvas>
    </div>
</div>

<script>
    $(document).ready(function() {
        let infoChart = null;

        function fetchGeneralInfo() {
            $.ajax({
                url: '/api/general-info', // L'endpoint Flask qui récupère les données
                method: 'GET',
                success: function(data) {
                    // Mise à jour des valeurs dans les cartes
                    $('#total_cases').text(data.total_cases || 0);
                    $('#total_deaths').text(data.total_deaths || 0);
                    $('#last_update').text(data.last_update || 'N/A');

                    // Vérifie si un graphique existe déjà et le détruit avant d'en recréer un nouveau
                    if (infoChart) {
                        infoChart.destroy();
                    }

                    var ctx = document.getElementById('info-chart').getContext('2d');
                    infoChart = new Chart(ctx, {
                        type: 'pie',
                        data: {
                            labels: ['Cas', 'Décès'],
                            datasets: [{
                                label: 'Informations Générales',
                                data: [data.total_cases || 0, data.total_deaths || 0],
                                backgroundColor: ['rgba(0, 123, 255, 0.7)', 'rgba(220, 53, 69, 0.7)'], // Couleurs des cartes
                                borderColor: ['rgba(0, 123, 255, 1)', 'rgba(220, 53, 69, 1)'],
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    position: 'top',
                                },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            let label = context.label || '';
                                            if (label) {
                                                label += ': ';
                                            }
                                            if (context.parsed !== null) {
                                                label += context.parsed;
                                            }
                                            return label;
                                        }
                                    }
                                }
                            }
                        }
                    });
                },
                error: function(error) {
                    console.error('Erreur lors de la récupération des données:', error);
                }
            });
        }

        fetchGeneralInfo();
    });
</script>

</body>
</html>
